<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Web - Tokyo Denki Library</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f4f4; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .header-denki { background-color: #d35400; color: white; padding: 20px; text-align: center; margin-bottom: 30px; }
        .task-card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .blue-box { background-color: #4a76c4; color: white; padding: 10px; margin-bottom: 5px; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

<div class="header-denki">
    <h1>Tokyo Denki Library - Web Tasks</h1>
    <p>Program Studi Perpustakaan dan Sains Informasi - USU 2023</p>
</div>

<div class="container">
    
    <div class="task-card">
        <h3>1. Looping 1 Sampai 1000 (Generate Otomatis)</h3>
        <button onclick="generateLoop()" class="btn btn-primary mb-3">Tampilkan 1000 Baris</button>
        <div id="tempatLoop" style="height: 300px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; display: none;">
            </div>
    </div>

    <div class="task-card">
        <h3>2. Kalkulator Tokyo Denki</h3>
        <div class="row g-3">
            <div class="col-md-4">
                <input type="number" id="angka1" class="form-control" placeholder="Angka 1">
            </div>
            <div class="col-md-4">
                <select id="operator" class="form-select">
                    <option value="+">Tambah (+)</option>
                    <option value="-">Kurang (-)</option>
                    <option value="*">Kali (x)</option>
                    <option value="/">Bagi (/)</option>
                </select>
            </div>
            <div class="col-md-4">
                <input type="number" id="angka2" class="form-control" placeholder="Angka 2">
            </div>
            <div class="col-12">
                <button onclick="hitungKalkulator()" class="btn btn-warning fw-bold">Hitung</button>
            </div>
        </div>
        <div id="hasilKalkulator" class="mt-3"></div>
    </div>

    <div class="task-card">
        <h3>3. Sistem Login Perpustakaan</h3>
        <div class="row g-3">
            <div class="col-md-6">
                <input type="text" id="username" class="form-control" placeholder="Username (isi: admin)">
            </div>
            <div class="col-md-6">
                <input type="password" id="password" class="form-control" placeholder="Password (isi: 123)">
            </div>
            <div class="col-12">
                <button onclick="cekLogin()" class="btn btn-dark">Login</button>
            </div>
        </div>
        <div id="hasilLogin" class="mt-3"></div>
    </div>

    <div class="task-card">
        <h3>4. Manajemen Data Buku (Simulasi CRUD Javascript)</h3>
        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>Judul Buku</th>
                    <th>Pengarang</th>
                    <th>Tahun</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="tabelBuku">
                </tbody>
        </table>
        
        <hr>
        <h5>Tambah Buku Baru</h5>
        <div class="row g-2">
            <div class="col-md-4"><input type="text" id="judulBaru" class="form-control" placeholder="Judul Buku"></div>
            <div class="col-md-4"><input type="text" id="pengarangBaru" class="form-control" placeholder="Pengarang"></div>
            <div class="col-md-2"><input type="number" id="tahunBaru" class="form-control" placeholder="Tahun"></div>
            <div class="col-md-2"><button onclick="tambahBuku()" class="btn btn-success w-100">+ Tambah</button></div>
        </div>
    </div>

</div>

<script>
    // FUNGSI NOMOR 1: LOOPING
    function generateLoop() {
        let container = document.getElementById("tempatLoop");
        container.style.display = "block";
        container.innerHTML = ""; // Kosongkan dulu
        let htmlContent = "";
        for (let i = 1; i <= 1000; i++) {
            htmlContent += `<div class='blue-box'>${i}. Ini adalah hari ke-${i} belajar Pemrograman Web</div>`;
        }
        container.innerHTML = htmlContent;
    }

    // FUNGSI NOMOR 2: KALKULATOR
    function hitungKalkulator() {
        let a1 = parseFloat(document.getElementById("angka1").value);
        let a2 = parseFloat(document.getElementById("angka2").value);
        let op = document.getElementById("operator").value;
        let hasilBox = document.getElementById("hasilKalkulator");
        
        if (isNaN(a1) || isNaN(a2)) {
            hasilBox.innerHTML = `<div class='alert alert-danger'>Masukkan angka dengan benar!</div>`;
            return;
        }

        let hasil = 0;
        if (op === "+") hasil = a1 + a2;
        else if (op === "-") hasil = a1 - a2;
        else if (op === "*") hasil = a1 * a2;
        else if (op === "/") hasil = a2 !== 0 ? a1 / a2 : "Error: Tidak bisa dibagi 0";

        hasilBox.innerHTML = `<div class='alert alert-info'>Hasilnya adalah: <strong>${hasil}</strong></div>`;
    }

    // FUNGSI NOMOR 3: LOGIN
    function cekLogin() {
        let user = document.getElementById("username").value;
        let pass = document.getElementById("password").value;
        let hasilBox = document.getElementById("hasilLogin");

        if (user === "" || pass === "") {
            hasilBox.innerHTML = `<div class='alert alert-warning'>Input tidak lengkap</div>`;
        } else if (user === "admin" && pass === "123") {
            hasilBox.innerHTML = `<div class='alert alert-success'>Login sukses</div>`;
        } else {
            hasilBox.innerHTML = `<div class='alert alert-danger'>Login gagal</div>`;
        }
    }

    // FUNGSI NOMOR 4: CRUD SIMULASI DATABASE
    let databaseBuku = [
        { judul: "Struktur HTML & CSS", pengarang: "Muhammad Al Bukhari", tahun: 2024 },
        { judul: "Sains Informasi", pengarang: "Himma Dewiyana", tahun: 2023 }
    ];

    function renderTabel() {
        let tbody = document.getElementById("tabelBuku");
        tbody.innerHTML = "";
        databaseBuku.forEach((buku, index) => {
            tbody.innerHTML += `
                <tr>
                    <td>${buku.judul}</td>
                    <td>${buku.pengarang}</td>
                    <td>${buku.tahun}</td>
                    <td>
                        <button onclick="hapusBuku(${index})" class="btn btn-sm btn-danger">Hapus</button>
                    </td>
                </tr>
            `;
        });
    }

    function tambahBuku() {
        let j = document.getElementById("judulBaru").value;
        let p = document.getElementById("pengarangBaru").value;
        let t = document.getElementById("tahunBaru").value;

        if (j !== "" && p !== "" && t !== "") {
            databaseBuku.push({ judul: j, pengarang: p, tahun: t });
            document.getElementById("judulBaru").value = "";
            document.getElementById("pengarangBaru").value = "";
            document.getElementById("tahunBaru").value = "";
            renderTabel();
        } else {
            alert("Lengkapi data buku dulu bang!");
        }
    }

    function hapusBuku(index) {
        databaseBuku.splice(index, 1);
        renderTabel();
    }

    // Panggil render tabel pertama kali web dibuka
    renderTabel();
</script>

</body>
</html>
